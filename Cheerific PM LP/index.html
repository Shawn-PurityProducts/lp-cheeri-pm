<script>
  /* richify: render plain string content with **bold**, *italic*, and an
     auto-inserted styled <sup>™</sup> after each "Cheerific". Use anywhere
     copy comes in as a string (Reasons body, testimonial quotes, etc.).
     `tmify` is kept as an alias for backward compat. */
  window.richify = function richify(input) {
    if (typeof input !== 'string') return input;
    const str = input.replace(/(Cheerific)\s*[™]/g, '$1');

    // Tokenize ***bold-italic***, **bold**, *italic*.
    const segs = [];
    let i = 0;
    while (i < str.length) {
      if (str.slice(i, i + 3) === '***') {
        const end = str.indexOf('***', i + 3);
        if (end !== -1) {
          segs.push({ k: 'bi', t: str.slice(i + 3, end) });
          i = end + 3; continue;
        }
      }
      if (str.slice(i, i + 2) === '**') {
        const end = str.indexOf('**', i + 2);
        if (end !== -1) {
          segs.push({ k: 'b', t: str.slice(i + 2, end) });
          i = end + 2; continue;
        }
      }
      if (str[i] === '*') {
        const end = str.indexOf('*', i + 1);
        if (end !== -1 && !str.slice(i + 1, end).includes('*')) {
          segs.push({ k: 'i', t: str.slice(i + 1, end) });
          i = end + 1; continue;
        }
      }
      let j = i;
      if (str[j] === '*') j++; // orphan asterisk (e.g. footnote *) — consume so we make progress
      while (j < str.length && str[j] !== '*') j++;
      segs.push({ k: 't', t: str.slice(i, j) });
      i = j;
    }

    let n = 0;
    const inject = (text) => {
      const parts = text.split('Cheerific');
      if (parts.length === 1) return [text];
      const out = [];
      parts.forEach((p, idx) => {
        if (idx > 0) {
          out.push('Cheerific');
          out.push(React.createElement('sup', { key: 'tm-' + (n++), className: 'tm' }, '™'));
        }
        if (p !== '') out.push(p);
      });
      return out;
    };

    const nodes = [];
    segs.forEach((s, idx) => {
      const inner = inject(s.t);
      if (s.k === 'bi') nodes.push(React.createElement('strong', { key: 'bi-' + idx }, React.createElement('em', null, ...inner)));
      else if (s.k === 'b') nodes.push(React.createElement('strong', { key: 'b-' + idx }, ...inner));
      else if (s.k === 'i') nodes.push(React.createElement('em', { key: 'i-' + idx }, ...inner));
      else inner.forEach((c) => nodes.push(c));
    });

    return React.createElement(React.Fragment, null, ...nodes);
  };
  window.tmify = window.richify;
</script>
<script>
  /* Shopify checkout config — single source of truth for all buy CTAs.
     Edit values here when variant IDs / plans change. */
  window.CHEERI_SHOP = {
    domain: 'https://www.cheerific.com',
    variantId: '51514508673322',
    subscriptionPlanId: '10800759082',
    checkoutUrl(plan) {
      const base = this.domain + '/cart/clear?return_to=';
      const sellingPlan = plan === 'subscription' ? '&items[][selling_plan]=' + this.subscriptionPlanId : '';
      // Forward every utm_* param from the landing page URL to the Shopify checkout.
      const params = new URLSearchParams(window.location.search);
      const utms = [];
      params.forEach((value, key) => {
        if (/^utm_/i.test(key)) utms.push(key + '=' + encodeURIComponent(value));
      });
      const checkoutQuery = utms.length ? '?' + utms.join('&') : '';
      // Encode the checkout path so its inner `&` separators survive Shopify's
      // redirect chain (cart/clear → cart/add → /checkout). Without this,
      // /cart/add splits return_to at the first `&` and only the first UTM rides through.
      const checkoutPath = encodeURIComponent('/checkout' + checkoutQuery);
      const inner = '/cart/add?items[][id]=' + this.variantId + '&items[][quantity]=1' + sellingPlan + '&return_to=' + checkoutPath;
      return base + encodeURIComponent(inner);
    },
    go(plan) {
      window.location.href = this.checkoutUrl(plan);
    },
  };
</script>

<script>
  /* Dev cache-bust: tag every text/babel src with a fresh timestamp so the
     in-browser Babel transformer always fetches the latest JSX. Browsers
     don't auto-fetch type="text/babel" — Babel does it via XHR on load —
     so rewriting the src here takes effect before any fetch. */
  document.querySelectorAll('script[type="text/babel"][src]').forEach((s) => {
    const u = new URL(s.getAttribute('src'), location.href);
    u.searchParams.set('_t', Date.now());
    s.setAttribute('src', u.toString());
  });
</script>
